<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okya</title>
    <meta name="description" content="Okyasoft Pte Ltd — a small studio in Singapore.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="icon" href="favicon.ico">

    <style>
        :root {
            --bg:        #0a0d12;
            --bg-grad:   #0e1218;
            --bone:      #ede6d6;
            --bone-soft: #b8b09c;
            --dim:       #6a6452;
            --faint:     #2a2d33;
            --rule:      #1a1d24;
            --amber:     #e89a3c;
            --amber-deep:#c97a26;

            --mono:    "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
            --display: "Instrument Serif", "Times New Roman", serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 60% at 50% 40%, var(--bg-grad) 0%, var(--bg) 70%);
            color: var(--bone);
            font-family: var(--mono);
            font-weight: 400;
            font-size: 12px;
            line-height: 1.6;
            letter-spacing: 0.02em;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Faint grid backdrop */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                linear-gradient(to right, rgba(237,230,214,0.025) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(237,230,214,0.025) 1px, transparent 1px);
            background-size: 64px 64px;
            mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 30%, transparent 90%);
            -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 30%, transparent 90%);
        }

        /* Grain */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            opacity: 0.5;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.93 0 0 0 0 0.9 0 0 0 0 0.84 0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* Corner crosshairs */
        .crosshair {
            position: fixed;
            width: 14px;
            height: 14px;
            z-index: 50;
            opacity: 0.45;
            pointer-events: none;
            color: var(--bone-soft);
        }
        .crosshair::before, .crosshair::after {
            content: "";
            position: absolute;
            background: currentColor;
        }
        .crosshair::before { left: 50%; top: 0;  width: 1px; height: 100%; transform: translateX(-50%); }
        .crosshair::after  { top: 50%; left: 0;  height: 1px; width: 100%; transform: translateY(-50%); }
        .crosshair.tl { top: 16px;    left: 16px;    }
        .crosshair.tr { top: 16px;    right: 16px;   }
        .crosshair.bl { bottom: 16px; left: 16px;    }
        .crosshair.br { bottom: 16px; right: 16px;   }

        /* ── Frame ──────────────────────────────── */
        .stage {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: clamp(24px, 3vw, 44px) clamp(28px, 4vw, 64px);
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: clamp(36px, 5vh, 64px);
        }

        /* ── Top strip ─────────────────────────── */
        .strip {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            font-size: 10.5px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--bone-soft);
            animation: fade-in 1.4s ease 0s both;
        }
        .strip .left { display: inline-flex; align-items: center; gap: 12px; }
        .strip .left .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--amber);
            box-shadow: 0 0 12px 1px rgba(232,154,60,0.6);
            animation: pulse 2.6s ease-out infinite;
        }
        .strip .center {
            color: var(--dim);
            font-size: 10px;
            letter-spacing: 0.32em;
        }
        .strip .right { text-align: right; color: var(--dim); }
        .strip .right b {
            color: var(--bone-soft);
            font-weight: 400;
            letter-spacing: 0.22em;
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 12px 1px rgba(232,154,60,0.6); }
            70%  { box-shadow: 0 0 22px 4px rgba(232,154,60,0); }
            100% { box-shadow: 0 0 12px 1px rgba(232,154,60,0); }
        }

        /* ── Centerpiece composition ───────────── */
        main {
            display: grid;
            grid-template-columns: minmax(260px, 1fr) minmax(280px, 1fr);
            align-items: center;
            justify-items: center;
            gap: clamp(40px, 6vw, 96px);
            position: relative;
        }

        /* Apparatus */
        .apparatus {
            position: relative;
            width: clamp(240px, 32vmin, 420px);
            aspect-ratio: 1;
            animation: rise 1.4s cubic-bezier(.2,.7,.2,1) 0.2s both;
        }
        .apparatus svg {
            width: 100%;
            height: 100%;
            display: block;
            overflow: visible;
        }
        .ring-outer { animation: spin 90s linear infinite; transform-origin: 50% 50%; transform-box: fill-box; }
        .ring-mid   { animation: spin-rev 60s linear infinite; transform-origin: 50% 50%; transform-box: fill-box; }
        .ring-inner { animation: spin 35s linear infinite; transform-origin: 50% 50%; transform-box: fill-box; }
        .orbit      { animation: orbit 14s linear infinite; transform-origin: 50% 50%; transform-box: fill-box; }
        .ticks-mark { animation: spin-rev 200s linear infinite; transform-origin: 50% 50%; transform-box: fill-box; }

        @keyframes spin     { from { transform: rotate(0); } to { transform: rotate(360deg); } }
        @keyframes spin-rev { from { transform: rotate(0); } to { transform: rotate(-360deg); } }
        @keyframes orbit    { from { transform: rotate(0); } to { transform: rotate(360deg); } }

        /* Editorial column */
        .editorial {
            display: flex;
            flex-direction: column;
            gap: 28px;
            max-width: 36ch;
            justify-self: start;
        }

        .label {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: var(--dim);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            animation: fade-in 1.2s ease 0.4s both;
        }
        .label::before {
            content: "";
            width: 24px; height: 1px;
            background: var(--dim);
        }

        .wordmark {
            font-family: var(--display);
            font-style: italic;
            font-weight: 400;
            font-size: clamp(96px, 14vw, 200px);
            line-height: 0.82;
            letter-spacing: -0.02em;
            color: var(--bone);
            animation: rise 1.4s cubic-bezier(.2,.7,.2,1) 0.5s both;
        }
        .wordmark .acc { color: var(--amber); }

        .copy {
            font-family: var(--display);
            font-style: italic;
            font-weight: 400;
            font-size: clamp(20px, 1.9vw, 26px);
            line-height: 1.35;
            color: var(--bone-soft);
            max-width: 30ch;
            animation: fade-up 1.2s cubic-bezier(.2,.7,.2,1) 0.8s both;
        }
        .copy::after {
            content: "";
            display: block;
            width: 40px;
            height: 1px;
            margin-top: 24px;
            background: var(--amber-deep);
        }

        /* ── Footer ───────────────────────────── */
        footer {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: end;
            gap: 32px;
            font-size: 10.5px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--bone-soft);
            padding-top: 24px;
            border-top: 1px solid var(--rule);
            animation: fade-up 1.2s cubic-bezier(.2,.7,.2,1) 1.1s both;
        }

        footer .left {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        footer .left .name {
            color: var(--bone);
            letter-spacing: 0.16em;
        }
        footer .left .year {
            color: var(--dim);
            font-size: 10px;
            letter-spacing: 0.28em;
        }

        footer .center a {
            display: inline-flex;
            align-items: baseline;
            gap: 10px;
            color: var(--bone);
            text-decoration: none;
            font-family: var(--display);
            font-style: italic;
            font-weight: 400;
            font-size: 22px;
            letter-spacing: 0;
            text-transform: none;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--rule);
            transition: color 0.4s ease, border-color 0.4s ease;
        }
        footer .center a .arr {
            font-family: var(--mono);
            font-style: normal;
            font-size: 11px;
            letter-spacing: 0.16em;
            color: var(--amber);
            transition: transform 0.4s ease;
        }
        footer .center a:hover {
            color: var(--amber);
            border-color: var(--amber);
        }
        footer .center a:hover .arr { transform: translate(3px, -2px); }

        footer .right {
            display: flex;
            justify-content: flex-end;
            gap: 24px;
        }
        footer .right a {
            color: var(--bone-soft);
            text-decoration: none;
            position: relative;
            padding-bottom: 3px;
            transition: color 0.3s ease;
        }
        footer .right a::after {
            content: "";
            position: absolute;
            left: 0; bottom: 0;
            width: 0; height: 1px;
            background: var(--amber);
            transition: width 0.4s cubic-bezier(.2,.7,.2,1);
        }
        footer .right a:hover { color: var(--bone); }
        footer .right a:hover::after { width: 100%; }

        /* Animations */
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fade-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes rise    { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 880px) {
            main {
                grid-template-columns: 1fr;
                gap: 48px;
                padding: 8px 0;
            }
            .editorial {
                justify-self: center;
                align-items: center;
                text-align: center;
                max-width: 32ch;
            }
            .copy { text-align: center; }
            .copy::after { margin-left: auto; margin-right: auto; }
            .label { justify-content: center; }
            footer {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 28px;
            }
            footer .left, footer .right { align-items: center; justify-content: center; }
            footer .right { flex-wrap: wrap; }
            .strip {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                font-size: 9.5px;
            }
            .strip .center { display: none; }
        }

        @media (max-width: 480px) {
            .wordmark { font-size: clamp(72px, 22vw, 120px); }
            .copy { font-size: 18px; }
            .crosshair { width: 10px; height: 10px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>

    <!-- Analytics -->
    <script>
        (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
        (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
        m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
        })(window,document,'script','//www.google-analytics.com/analytics.js','ga');
        ga('create', 'UA-51929846-1', 'okyasoft.com');
        ga('send', 'pageview');
    </script>
</head>
<body>

    <span class="crosshair tl"></span>
    <span class="crosshair tr"></span>
    <span class="crosshair bl"></span>
    <span class="crosshair br"></span>

    <div class="stage">

        <header class="strip">
            <div class="left">
                <span class="dot" aria-hidden="true"></span>
                <span>Signal · Steady</span>
            </div>
            <div class="center">— Index N°&nbsp;01 —</div>
            <div class="right">
                <span><b>01°17′N · 103°51′E</b> &nbsp;/&nbsp; <span id="stamp">—</span></span>
            </div>
        </header>

        <main>

            <!-- Kinetic apparatus -->
            <div class="apparatus" aria-hidden="true">
                <svg viewBox="-200 -200 400 400" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
                            <stop offset="0%"  stop-color="#e89a3c" stop-opacity="0.18"/>
                            <stop offset="60%" stop-color="#e89a3c" stop-opacity="0"/>
                        </radialGradient>
                    </defs>

                    <!-- ambient glow -->
                    <circle cx="0" cy="0" r="190" fill="url(#glow)"/>

                    <!-- outermost tick ring -->
                    <g class="ticks-mark" stroke="#6a6452" stroke-width="1">
                        <g>
                            <line x1="0" y1="-188" x2="0" y2="-178"/>
                            <line x1="0" y1="-188" x2="0" y2="-178" transform="rotate(30)"/>
                            <line x1="0" y1="-188" x2="0" y2="-178" transform="rotate(60)"/>
                            <line x1="0" y1="-188" x2="0" y2="-178" transform="rotate(90)"/>
                            <line x1="0" y1="-188" x2="0" y2="-178" transform="rotate(120)"/>
                            <line x1="0" y1="-188" x2="0" y2="-178" transform="rotate(150)"/>
                            <line x1="0" y1="-188" x2="0" y2="-178" transform="rotate(180)"/>
                            <line x1="0" y1="-188" x2="0" y2="-178" transform="rotate(210)"/>
                            <line x1="0" y1="-188" x2="0" y2="-178" transform="rotate(240)"/>
                            <line x1="0" y1="-188" x2="0" y2="-178" transform="rotate(270)"/>
                            <line x1="0" y1="-188" x2="0" y2="-178" transform="rotate(300)"/>
                            <line x1="0" y1="-188" x2="0" y2="-178" transform="rotate(330)"/>
                        </g>
                    </g>

                    <!-- outer ring dashed -->
                    <g class="ring-outer">
                        <circle cx="0" cy="0" r="170" fill="none"
                                stroke="#b8b09c" stroke-width="0.6" opacity="0.5"
                                stroke-dasharray="2 6"/>
                        <circle cx="170" cy="0" r="2.5" fill="#ede6d6"/>
                    </g>

                    <!-- middle ring solid hairline + orbiting dot -->
                    <g class="ring-mid">
                        <circle cx="0" cy="0" r="120" fill="none"
                                stroke="#6a6452" stroke-width="0.6" opacity="0.7"/>
                        <g class="orbit">
                            <circle cx="120" cy="0" r="4" fill="#e89a3c"/>
                            <circle cx="120" cy="0" r="9" fill="none" stroke="#e89a3c" stroke-width="0.5" opacity="0.5"/>
                        </g>
                    </g>

                    <!-- inner ring with longer dashes -->
                    <g class="ring-inner">
                        <circle cx="0" cy="0" r="74" fill="none"
                                stroke="#b8b09c" stroke-width="0.7" opacity="0.6"
                                stroke-dasharray="14 8"/>
                        <line x1="-74" y1="0" x2="-66" y2="0" stroke="#ede6d6" stroke-width="1"/>
                        <line x1="74"  y1="0" x2="66"  y2="0" stroke="#ede6d6" stroke-width="1"/>
                    </g>

                    <!-- center crosshair -->
                    <g stroke="#ede6d6" stroke-width="0.7">
                        <line x1="-22" y1="0" x2="-6" y2="0"/>
                        <line x1="22"  y1="0" x2="6"  y2="0"/>
                        <line x1="0" y1="-22" x2="0" y2="-6"/>
                        <line x1="0" y1="22"  x2="0" y2="6"/>
                    </g>
                    <circle cx="0" cy="0" r="2" fill="#e89a3c"/>

                    <!-- subtle diagonal axis -->
                    <line x1="-160" y1="160" x2="160" y2="-160"
                          stroke="#2a2d33" stroke-width="0.6"/>
                </svg>
            </div>

            <!-- Editorial column -->
            <div class="editorial">
                <h1 class="wordmark"><span>okya</span><span class="acc">.</span></h1>
                <p class="copy">Instruments for software, intelligence and craft.</p>
            </div>

        </main>

        <footer>
            <div class="left">
                <span class="name">© Okyasoft Pte Ltd</span>
                <span class="year">MMXXIII · All Rights Reserved</span>
            </div>

            <div class="center">
                <a href="https://securade.ai" target="_blank" rel="noopener">
                    Securade.ai <span class="arr">↗</span>
                </a>
            </div>

            <div class="right">
                <a href="https://www.linkedin.com/company/okyasoft/" target="_blank" rel="noopener">LinkedIn</a>
                <a href="https://www.facebook.com/Okyasoft" target="_blank" rel="noopener">Facebook</a>
                <a href="https://twitter.com/Okyasoft" target="_blank" rel="noopener">Twitter</a>
            </div>
        </footer>

    </div>

    <script>
        (function () {
            var stamp = document.getElementById('stamp');
            if (!stamp) return;
            function pad(n){ return n < 10 ? '0'+n : ''+n; }
            function tick(){
                var d = new Date();
                stamp.textContent = pad(d.getUTCHours())+':'+pad(d.getUTCMinutes())+':'+pad(d.getUTCSeconds())+' UTC';
            }
            tick();
            setInterval(tick, 1000);
        })();
    </script>
</body>
</html>
